# Railway deployment configuration
# This file tells Railway how to deploy and manage the services

[build]
builder = "dockerfile"
buildCommand = ""

[[services]]
name = "gateway"
dockerfile = "./services/gateway/Dockerfile"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
port = 8000

[[services]]
name = "upload"
dockerfile = "./services/upload/Dockerfile"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8001"
port = 8001

[[services]]
name = "reports"
dockerfile = "./services/reports/Dockerfile"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8002"
port = 8002

[[services]]
name = "processor"
dockerfile = "./services/processor/Dockerfile"
startCommand = "celery -A shared.celery worker --loglevel=info"
port = 0

[[services]]
name = "minio"
dockerfile = "./services/minio/Dockerfile"
startCommand = "server /data --console-address ':9001'"
port = 9000
