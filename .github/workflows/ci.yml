name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-gateway:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'services/gateway') || contains(github.event.pull_request.changed_files, 'shared') }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --package gateway --group dev
      - run: uv run ruff check services/gateway/app
      - run: uv run pytest services/gateway/tests -v

  test-upload:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'services/upload') || contains(github.event.pull_request.changed_files, 'shared') }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --package upload --group dev
      - run: uv run ruff check services/upload/app
      - run: uv run pytest services/upload/tests -v

  test-processor:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'services/processor') || contains(github.event.pull_request.changed_files, 'shared') }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --package processor --group dev
      - run: uv run ruff check services/processor/app
      - run: uv run pytest services/processor/tests -v

  test-reports:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'services/reports') || contains(github.event.pull_request.changed_files, 'shared') }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --package reports --group dev
      - run: uv run ruff check services/reports/app
      - run: uv run pytest services/reports/tests -v

  build:
    runs-on: ubuntu-latest
    needs: [test-gateway, test-upload, test-processor, test-reports]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
