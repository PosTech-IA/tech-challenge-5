services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      UPLOAD_SERVICE_URL: http://upload:8001
      REPORTS_SERVICE_URL: http://reports:8002
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      upload:
        condition: service_started
      reports:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  upload:
    volumes:
      - ./uploads:/app/uploads
    build:
      context: .
      dockerfile: services/upload/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres/upload_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  processor:
    volumes:
      - ./uploads:/app/uploads
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres/upload_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      minio:
        condition: service_healthy

  reports:
    volumes:
      - ./uploads:/app/uploads
    build:
      context: .
      dockerfile: services/reports/Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres/upload_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  minio_data:
